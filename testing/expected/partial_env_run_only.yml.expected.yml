# Partial remediation: env already binds the expression but run still embeds ${{ ... }}.
# Expected: run-only patch (replace expression with $PR_TITLE, do not duplicate env block).
name: Partial env binding

on:
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Half-fixed notifier
        env:
          PR_TITLE: ${{ github.event.issue.title }}
        run: 'echo "Issue: $PR_TITLE"'

      - name: Fully fixed notifier
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: 'echo "Issue: $ISSUE_TITLE"'
