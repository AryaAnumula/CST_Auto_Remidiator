# .github/workflows/issue-triage.yml
name: Issue triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Greet reporter
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: 'echo "Thanks for opening: $ISSUE_TITLE"'

      - name: Add label
        run: echo "Labeling issue"
